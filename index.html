<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SocialStats Public Docs</title>
  <style>
    :root {
      --bg: #f6f8fa;
      --canvas: #fff;
      --text: #24292f;
      --muted: #57606a;
      --border: #d0d7de;
      --accent: #0969da;
      --shadow: 0 8px 24px rgba(140, 149, 159, 0.18);
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.55;
    }
    main {
      max-width: 860px;
      margin: 72px auto;
      padding: 34px;
      background: var(--canvas);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(32px, 5vw, 48px);
      line-height: 1.05;
      letter-spacing: -0.04em;
    }
    p {
      color: var(--muted);
    }
    a {
      color: var(--accent);
      font-weight: 600;
    }
    .links {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 14px;
      margin-top: 24px;
    }
    .card {
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #f6f8fa;
    }
    .card h2 {
      margin: 0 0 8px;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <main>
    <h1>SocialStats Public Docs</h1>
    <p>Public entry points for SocialStats documentation and roadmap tracking.</p>
    <div class="links">
      <div class="card">
        <h2>Roadmap</h2>
        <p>Open the GitHub Project board for SocialStats roadmap and issue tracking.</p>
        <a href="roadmap">Open roadmap</a>
      </div>
      <div class="card">
        <h2>Repository</h2>
        <p>Public docs redirect repository hosted with GitHub Pages.</p>
        <a href="https://github.com/esfih/SocialStats-Docs">Open docs repo</a>
      </div>
    </div>
  </main>
</body>
</html>
